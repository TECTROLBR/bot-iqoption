<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Status</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00ff88;
            --secondary-color: #292929;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .main-layout {
            display: flex;
            width: 100%;
            max-width: 98%;
            gap: 20px;
            height: 90vh;
        }

        .content-area {
            flex: 1;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Dropdown Estilizado */
        .control-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        select {
            background-color: var(--secondary-color);
            color: white;
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            min-width: 200px;
        }

        select:hover {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        /* Tabela de Histórico */
        .history-container {
            flex: 1; /* Ocupa o restante do espaço */
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background-color: var(--secondary-color);
            position: sticky;
            top: 0;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--accent-color);
        }

        tr:hover {
            background-color: #2a2a2a;
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--secondary-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }

        .status-bar {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
            text-align: right;
        }

        /* Estilos do Gerente de Finanças */
        .finance-card {
            background-color: var(--card-bg); /* Fundo do card principal */
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .balance-value {
            font-size: 1.8rem;
            color: var(--accent-color);
            font-weight: bold;
            margin: 10px 0;
        }

        .account-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .account-btn {
            background-color: #333;
            color: #888;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .account-btn.active {
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        /* Estilos da Bússola de Tendência */
        .compass-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--secondary-color);
            padding: 5px 15px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }
        .compass-icon {
            font-size: 1.5rem;
            transition: transform 0.5s ease, color 0.3s;
        }
        .compass-text {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .trend-up { color: #00ff88; transform: rotate(0deg); }
        .trend-down { color: #ff4444; transform: rotate(180deg); }
        .trend-flat { color: #aaa; transform: rotate(90deg); }

    </style>
</head>
<body>

    <div class="main-layout">
        <!-- Área Principal -->
        <div class="content-area">
            <h1>Tela de Status</h1>
        
            <!-- Painel de Finanças (Movido para o topo) -->
            <div class="finance-card">
                <h2 style="text-align:center; color:var(--accent-color); margin-top:0;">Finanças</h2>
                <div>Saldo Atual</div>
                <div class="balance-value" id="saldoDisplay">---</div>
                
                <div style="margin: 15px 0; border-top: 1px solid #333; padding-top: 10px;">
                    <div style="font-size: 0.9rem; color: #aaa;">Lucro da Sessão: <span id="lucroDisplay" style="font-weight:bold;">---</span></div>
                </div>

                <div class="account-selector" style="flex-direction: row; justify-content: center;">
                    <button id="btnPractice" class="account-btn" onclick="trocarConta('PRACTICE')">Conta Treinamento</button>
                    <button id="btnReal" class="account-btn" onclick="trocarConta('REAL')">Conta Real</button>
                </div>
            </div>

            <div class="control-panel">
                <select id="ativoSelect">
                    <option value="" disabled selected>Carregando ativos OTC...</option>
                </select>
                <div class="compass-container" title="Tendência de Mercado (SMA 20)">
                    <div id="compassIcon" class="compass-icon trend-flat">➤</div>
                    <span id="compassText" class="compass-text">---</span>
                </div>
                <button onclick="testarTelegram()" style="background-color:#0088cc; color:#fff;" title="Enviar mensagem de teste">✈️ Telegram</button>
                <button onclick="iniciarMonitoramento()">Selecionar Ativo</button>
            </div>

            <div class="history-container">
                <table>
                    <thead>
                        <tr>
                            <th>Horário</th>
                            <th>Abertura</th>
                            <th>Fechamento</th>
                            <th>Min</th>
                            <th>Max</th>
                            <th>Volume</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        <!-- Dados serão inseridos aqui via JS -->
                    </tbody>
                </table>
            </div>
            <div class="status-bar" id="statusMsg">Aguardando seleção...</div>
        </div>
    </div>

    <script>
        let estadosAnteriores = {}; // Para rastrear mudanças de status das estratégias

        // Carregar ativos ao iniciar
        async function carregarAtivos() {
            try {
                const response = await fetch('/api/ativos-otc');
                const ativos = await response.json();
                
                const select = document.getElementById('ativoSelect');
                select.innerHTML = '<option value="" disabled selected>Escolha um ativo OTC</option>';
                
                ativos.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.ativo;
                    // Mostra o nome e o payout (ex: EURUSD-OTC (91%))
                    option.textContent = `${item.ativo} (${item.payout}%)`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao carregar ativos:", error);
                document.getElementById('ativoSelect').innerHTML = '<option>Erro ao carregar</option>';
            }
        }

        // Iniciar monitoramento do ativo escolhido
        async function iniciarMonitoramento() {
            const ativo = document.getElementById('ativoSelect').value;
            if (!ativo) return alert("Selecione um ativo!");

            document.getElementById('statusMsg').innerText = `Carregando histórico de ${ativo}...`;

            const response = await fetch('/api/selecionar-ativo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ativo: ativo})
            });
            
            const result = await response.json();
            if (result.erro) {
                alert(result.erro);
                document.getElementById('statusMsg').innerText = "Erro: " + result.erro;
            } else {
                document.getElementById('statusMsg').innerText = result.mensagem;
            }
            
            // Começa a atualizar a tabela periodicamente
            gerenciarAtualizacaoVelas(); // Inicia o loop inteligente das velas
            atualizarTendencia();
            setInterval(atualizarTendencia, 2000);
        }

        // Buscar dados do histórico e renderizar
        async function atualizarTabela() {
            try {
                const response = await fetch('/api/historico');
                const dados = await response.json();
                
                const tbody = document.getElementById('tabelaCorpo');
                tbody.innerHTML = ''; // Limpa tabela (pode ser otimizado para não redesenhar tudo)

                // Inverte para mostrar o mais recente no topo
                [...dados].reverse().forEach(vela => {
                    const tr = document.createElement('tr');
                    
                    // Define cor baseada se subiu (verde) ou desceu (vermelho)
                    const cor = vela.close >= vela.open ? '#00ff88' : '#ff4444';
                    
                    tr.innerHTML = `
                        <td>${vela.horario_formatado}</td>
                        <td>${vela.open}</td>
                        <td style="color: ${cor}; font-weight: bold;">${vela.close}</td>
                        <td>${vela.min}</td>
                        <td>${vela.max}</td>
                        <td>${vela.volume}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Erro ao atualizar tabela:", error);
            }
        }

        // Loop de Atualização da Tabela
        function gerenciarAtualizacaoVelas() {
            // Evita duplicidade se clicar no botão várias vezes
            if (window.loopVelasId) clearTimeout(window.loopVelasId);
            
            atualizarTabela();
            
            // Atualiza constantemente a cada 1 segundo para garantir sincronia visual
            // Como roda localmente, isso é muito leve e não trava o PC
            window.loopVelasId = setTimeout(gerenciarAtualizacaoVelas, 1000);
        }

        // Atualizar Bússola de Tendência
        async function atualizarTendencia() {
            try {
                const response = await fetch('/api/tendencia');
                const dados = await response.json();
                
                const icon = document.getElementById('compassIcon');
                const text = document.getElementById('compassText');
                
                // Reseta classes
                icon.className = 'compass-icon';
                
                if (dados.tendencia === 'ALTA') {
                    icon.classList.add('trend-up');
                    text.innerText = "ALTA";
                } else if (dados.tendencia === 'BAIXA') {
                    icon.classList.add('trend-down');
                    text.innerText = "BAIXA";
                } else {
                    icon.classList.add('trend-flat');
                    text.innerText = "LATERAL";
                }
            } catch (error) {
                console.error("Erro ao atualizar tendência:", error);
            }
        }

        // Gerente de Finanças
        async function atualizarSaldo() {
            try {
                const response = await fetch('/api/saldo');
                const dados = await response.json();
                
                if (dados.erro) return;

                // Atualiza valor
                document.getElementById('saldoDisplay').innerText = 
                    dados.saldo.toLocaleString('en-US', { style: 'currency', currency: 'USD' });

                // Atualiza Lucro da Sessão
                const elLucro = document.getElementById('lucroDisplay');
                elLucro.innerText = dados.lucro.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                elLucro.style.color = dados.lucro >= 0 ? '#00ff88' : '#ff4444'; // Verde se positivo, Vermelho se negativo

                // Atualiza botões
                const btnPractice = document.getElementById('btnPractice');
                const btnReal = document.getElementById('btnReal');

                if (dados.modo === 'PRACTICE') {
                    btnPractice.classList.add('active');
                    btnReal.classList.remove('active');
                } else {
                    btnReal.classList.add('active');
                    btnPractice.classList.remove('active');
                }
            } catch (error) {
                console.error("Erro ao atualizar saldo:", error);
            }
        }

        async function trocarConta(tipo) {
            await fetch('/api/alterar-conta', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tipo: tipo})
            });
            atualizarSaldo(); // Atualiza imediatamente após a troca
        }

        async function testarTelegram() {
            const response = await fetch('/api/telegram/status');
            const data = await response.json();
            alert(data.mensagem);
        }

        // Inicializa
        carregarAtivos();
        // Primeira carga
        setTimeout(atualizarSaldo, 1000);
        // Atualização periódica do saldo a cada 2 segundos para manter sincronizado
        setInterval(atualizarSaldo, 2000);
        
        // Atualiza o relógio a cada segundo
    setInterval(() => {
        fetch('/api/tempo-vela')
            .then(response => response.json())
            .then(data => {
                // Cria ou atualiza um elemento para mostrar o tempo
                let display = document.getElementById('relogio-vela');
                if (!display) {
                    display = document.createElement('div');
                    display.id = 'relogio-vela';
                    display.style.position = 'fixed';
                    display.style.top = '10px';
                    display.style.right = '10px';
                    display.style.fontSize = '24px';
                    display.style.fontWeight = 'bold';
                    display.style.backgroundColor = 'rgba(0,0,0,0.7)';
                    display.style.color = 'white';
                    display.style.padding = '10px';
                    display.style.borderRadius = '5px';
                    display.style.zIndex = '9999';
                    document.body.appendChild(display);
                }
                display.innerText = "⏳ " + data.restante + "s";
                
                // Muda a cor se estiver perto do fim
                if (data.restante <= 10) display.style.color = '#ff4444'; // Vermelho
                else display.style.color = 'white';
            });
    }, 1000);
    </script>
</body>
</html>
